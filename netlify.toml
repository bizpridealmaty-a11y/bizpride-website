[build]
  command = "npm run build"
  publish = "dist"

# ─────────────────────────────────────────────────────────────────────
# 1. Force apex domain: www.bizpride.kz → bizpride.kz (301)
# ─────────────────────────────────────────────────────────────────────
[[redirects]]
  from = "https://www.bizpride.kz/*"
  to = "https://bizpride.kz/:splat"
  status = 301
  force = true

# ─────────────────────────────────────────────────────────────────────
# 2. Old Wix portfolio URLs → 410 Gone (content permanently removed)
#    Tells Google to drop these from the index.
#    Note: Netlify requires a `to` value even for 410; the body served
#    is irrelevant — only the status code matters for SEO.
# ─────────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/portfolio-collections/*"
  to = "/"
  status = 410
  force = true

# ─────────────────────────────────────────────────────────────────────
# 3. Old manual sitemap path: kept for safety (was removed in commit
#    9c8bff6 in favor of @astrojs/sitemap → /sitemap-index.xml)
# ─────────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap-index.xml"
  status = 301
  force = true

# ─────────────────────────────────────────────────────────────────────
# 4. Explicit trailing-slash redirects for known top-level routes.
#    GSC reported "Redirect error" on 25.04.2026 for /events without
#    slash. Pretty URLs (below) already handles this, but explicit
#    rules provide a defensive layer in case Netlify defaults change.
#    Order matters: these MUST be above any catch-all SPA fallback.
# ─────────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/events"
  to = "/events/"
  status = 301
  force = true

[[redirects]]
  from = "/about"
  to = "/about/"
  status = 301
  force = true

[[redirects]]
  from = "/photos"
  to = "/photos/"
  status = 301
  force = true

[[redirects]]
  from = "/residents"
  to = "/residents/"
  status = 301
  force = true

[[redirects]]
  from = "/blog"
  to = "/blog/"
  status = 301
  force = true

# ─────────────────────────────────────────────────────────────────────
# 5. Catch-all trailing-slash enforcement via Netlify's "Pretty URLs"
#    feature. Astro emits /path/index.html, so /path access auto-
#    redirects to /path/ when this is on. Explicit rules above remain
#    as a safety net for the most-trafficked routes.
# ─────────────────────────────────────────────────────────────────────
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true
