[build]
  command = "npm run build"
  publish = "dist"

# ─────────────────────────────────────────────────────────────────────
# 1. Force apex domain: www.bizpride.kz → bizpride.kz (301)
# ─────────────────────────────────────────────────────────────────────
[[redirects]]
  from = "https://www.bizpride.kz/*"
  to = "https://bizpride.kz/:splat"
  status = 301
  force = true

# ─────────────────────────────────────────────────────────────────────
# 2. Old Wix portfolio URLs → 410 Gone (content permanently removed)
#    Tells Google to drop these from the index.
#    Note: Netlify requires a `to` value even for 410; the body served
#    is irrelevant — only the status code matters for SEO.
# ─────────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/portfolio-collections/*"
  to = "/"
  status = 410
  force = true

# ─────────────────────────────────────────────────────────────────────
# 3. Old manual sitemap path: kept for safety (was removed in commit
#    9c8bff6 in favor of @astrojs/sitemap → /sitemap-index.xml)
# ─────────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap-index.xml"
  status = 301
  force = true

# ─────────────────────────────────────────────────────────────────────
# 4. Trailing-slash enforcement is handled by Netlify's "Pretty URLs"
#    feature alone. Astro emits /path/index.html, and Netlify auto-
#    redirects /path → /path/ when this is on.
#
#    DO NOT add explicit [[redirects]] for /about, /events, etc. with
#    `force = true` — Netlify matches both /path and /path/ for the
#    same `from = "/path"` rule, which causes an infinite redirect
#    loop on the slashed URL. Pretty URLs is the correct, safe path.
# ─────────────────────────────────────────────────────────────────────
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

# ─────────────────────────────────────────────────────────────────────
# 5. Long-cache for build-versioned static assets in /_astro/*.
#    Astro emits content-hashed filenames, so they're safe to cache
#    forever. `immutable` tells browsers to NEVER revalidate.
#    Massive win for repeat visits (40-60% faster page loads).
# ─────────────────────────────────────────────────────────────────────
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Same for fonts, if any are added later.
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─────────────────────────────────────────────────────────────────────
# 6. Medium-cache for image assets (1 day). They CAN change (re-upload
#    same filename), so don't make them immutable. Browser still avoids
#    revalidation for 24h, then checks once.
# ─────────────────────────────────────────────────────────────────────
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/residents/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

# ─────────────────────────────────────────────────────────────────────
# 7. Security headers — applied site-wide. None of these break
#    functionality; they pass Mozilla Observatory and securityheaders.com.
# ─────────────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Click-jacking protection: only allow same-origin to iframe us.
    X-Frame-Options = "SAMEORIGIN"
    # Stop browsers from MIME-sniffing wrong content type.
    X-Content-Type-Options = "nosniff"
    # Don't leak full URL referrer to third-party domains.
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Lock down permissions for APIs we don't use.
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=()"
