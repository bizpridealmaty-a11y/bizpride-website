[build]
  command = "npm run build"
  publish = "dist"

# ─────────────────────────────────────────────────────────────────────
# 1. Force apex domain: www.bizpride.kz → bizpride.kz (301)
# ─────────────────────────────────────────────────────────────────────
[[redirects]]
  from = "https://www.bizpride.kz/*"
  to = "https://bizpride.kz/:splat"
  status = 301
  force = true

# ─────────────────────────────────────────────────────────────────────
# 2. Old Wix portfolio URLs → 410 Gone (content permanently removed)
#    Tells Google to drop these from the index.
#    Note: Netlify requires a `to` value even for 410; the body served
#    is irrelevant — only the status code matters for SEO.
# ─────────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/portfolio-collections/*"
  to = "/"
  status = 410
  force = true

# ─────────────────────────────────────────────────────────────────────
# 3. Old manual sitemap path: kept for safety (was removed in commit
#    9c8bff6 in favor of @astrojs/sitemap → /sitemap-index.xml)
# ─────────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap-index.xml"
  status = 301
  force = true

# ─────────────────────────────────────────────────────────────────────
# 4. Explicit trailing-slash enforcement (defensive — Netlify already
#    does this via "Pretty URLs" defaults, but pinning it here means
#    behaviour stays stable if Netlify changes its defaults later).
#    Note: Astro emits /path/index.html, so this is what's actually
#    served at /path/. The rule below catches any /path access and
#    forces the slashed canonical.
# ─────────────────────────────────────────────────────────────────────
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true
